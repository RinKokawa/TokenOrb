appId: com.tokenorb.app
productName: TokenOrb
asar: true
compression: normal
files:
  - dist/**
  - dist-electron/**
  - build/**
  - package.json
directories:
  output: release
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - target: dmg
      arch:
        - universal
  icon: build/icon.png
  category: public.app-category.utilities
dmg:
  title: TokenOrb
