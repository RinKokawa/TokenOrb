name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        shell: bash
        run: |
          set -o pipefail
          report="$(mktemp)"
          if npm audit --omit=dev --registry=https://registry.npmjs.org/ 2>&1 | tee "$report"; then
            exit 0
          fi
          if grep -Eiq '(EAI_AGAIN|ECONNRESET|ECONNREFUSED|ETIMEDOUT|ENETUNREACH|ENOTFOUND|fetch failed|status code 5[0-9][0-9])' "$report"; then
            echo "::warning::npm audit was unavailable because of a transient registry or network error; continuing."
            exit 0
          fi
          exit 1
